version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: toxguard-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - MODEL_PATH=model/toxicity.h5
      - VOCAB_PATH=model/vocab.pkl
      - BACKEND_CORS_ORIGINS=["*"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: toxguard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
